<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>绷着脸 · Spring 路径设置</title>
  <link rel="stylesheet" href="spring-pages.css" />
</head>
<body class="spring-page">
  <header class="spring-page-header">
    <h1>Spring 探测路径</h1>
    <p class="spring-page-hint">每行一条路径，以 / 开头。保存后将在下次扫描时生效。</p>
  </header>
  <label class="spring-label" for="directories">扫描目录列表</label>
  <textarea id="directories" class="spring-textarea" rows="18"></textarea>
  <div class="spring-actions">
    <button type="button" class="spring-btn spring-btn-primary" id="saveBtn">保存设置</button>
    <button type="button" class="spring-btn" id="resetBtn">恢复默认设置</button>
  </div>
  <script src="../lib/spring-paths.js"></script>
  <script src="spring-settings.js"></script>
</body>
</html>
